name: runtime-diagnostic-k6

on:
  workflow_dispatch:
    inputs:
      target_mode:
        description: "local | external"
        required: true
        default: "local"
      base_url:
        description: "External BASE_URL when target_mode=external"
        required: false
        default: ""
      vus:
        description: "Peak virtual users"
        required: true
        default: "1000"
      duration:
        description: "Test duration, e.g. 30s, 1m, 5m"
        required: true
        default: "45s"
      think_ms:
        description: "Delay between requests in milliseconds"
        required: true
        default: "200"

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  runtime-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: efhc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d efhc_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      DB_SCHEMA_CORE: efhc_core
      DB_SCHEMA_ADMIN: efhc_admin
      DATABASE_URL: >-
        postgresql+psycopg://postgres:postgres@localhost:5432/efhc_test
      SYNC_DATABASE_URL: >-
        postgresql+psycopg://postgres:postgres@localhost:5432/efhc_test
      ASYNC_DATABASE_URL: >-
        postgresql+asyncpg://postgres:postgres@localhost:5432/efhc_test
      PSYCOPG_URL: >-
        postgresql://postgres:postgres@localhost:5432/efhc_test
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_PYTHON_VERSION_WARNING: "1"
      TARGET_MODE: ${{ github.event.inputs.target_mode }}
      INPUT_BASE_URL: ${{ github.event.inputs.base_url }}
      K6_VUS: ${{ github.event.inputs.vus }}
      K6_DURATION: ${{ github.event.inputs.duration }}
      THINK_MS: ${{ github.event.inputs.think_ms }}

    steps:
      - uses: actions/checkout@v4

      - name: Init artifacts
        run: |
          rm -rf ci_artifacts extracted
          mkdir -p ci_artifacts/runtime_artifacts
          mkdir -p ci_artifacts/backend_logs

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Versions
        run: |
          {
            echo "ref=$GITHUB_REF"
            echo "sha=$GITHUB_SHA"
            python -V
            python -m pip -V
            node -v
            npm -v
          } | tee ci_artifacts/01_versions.txt

      - name: Ensure efhc.zip
        run: |
          test -f efhc.zip || \
            (echo "ERROR: efhc.zip missing" && exit 1)
          ls -la efhc.zip | tee ci_artifacts/02_efhc_zip_ls.txt

      - name: Unzip efhc.zip
        run: |
          mkdir -p extracted
          unzip -q efhc.zip -d extracted
          find extracted -maxdepth 12 -name ".npmrc" \
            -print -delete || true
          test -d extracted/backend || \
            (echo "ERROR: extracted/backend missing" && exit 1)
          test -f extracted/backend/alembic.ini || exit 1
          test -f extracted/backend/requirements.txt || exit 1

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r extracted/backend/requirements.txt
          pip install "psycopg[binary]" alembic PyJWT
          pip freeze | sort | tee ci_artifacts/03_pip_freeze.txt

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg ca-certificates
          curl -fsSL https://dl.k6.io/key.gpg \
            | sudo gpg --dearmor \
              -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version | tee ci_artifacts/04_k6_version.txt

      - name: Install psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql --version | tee ci_artifacts/05_psql_version.txt

      - name: Alembic upgrade head
        if: ${{ env.TARGET_MODE == 'local' }}
        run: |
          cd extracted/backend
          python -m alembic -c alembic.ini upgrade head \
            2>&1 | tee ../../ci_artifacts/06_alembic_upgrade.txt

      - name: Startup smoke import
        if: ${{ env.TARGET_MODE == 'local' }}
        run: |
          cd extracted
          PYTHONPATH=backend python - <<'PY' \
            2>&1 | tee ../ci_artifacts/07_startup_smoke.txt
          import importlib
          mod = importlib.import_module('app.main')
          assert hasattr(mod, 'app'), 'app.main must export FastAPI app'
          print('Startup smoke import OK')
          PY

      - name: Start backend locally
        if: ${{ env.TARGET_MODE == 'local' }}
        run: |
          cd extracted
          nohup env PYTHONPATH=backend \
            python -m uvicorn app.main:app \
            --host 127.0.0.1 \
            --port 8000 \
            > ../ci_artifacts/backend_logs/backend.log 2>&1 &
          echo $! > ../ci_artifacts/backend_logs/backend.pid
          sleep 3

      - name: Wait for local backend health
        if: ${{ env.TARGET_MODE == 'local' }}
        run: |
          python - <<'PY'
          import sys
          import time
          import urllib.request

          url = 'http://127.0.0.1:8000/health'
          deadline = time.time() + 120

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=5) as resp:
                      if resp.status == 200:
                          print('Backend is ready')
                          sys.exit(0)
              except Exception:
                  pass
              time.sleep(2)

          print('Backend did not become ready in time', file=sys.stderr)
          sys.exit(1)
          PY

      - name: Print backend log on failure
        if: ${{ failure() && env.TARGET_MODE == 'local' }}
        run: |
          echo '===== backend.log (tail 200) ====='
          if [ -f ci_artifacts/backend_logs/backend.log ]; then
            tail -n 200 ci_artifacts/backend_logs/backend.log
            tail -n 200 ci_artifacts/backend_logs/backend.log \
              > ci_artifacts/runtime_artifacts/backend_tail.txt
            cp ci_artifacts/backend_logs/backend.log \
              ci_artifacts/runtime_artifacts/backend.log
          else
            echo 'backend log not found'
          fi

      - name: Resolve BASE_URL
        run: |
          if [ "${TARGET_MODE}" = "local" ]; then
            echo 'BASE_URL=http://127.0.0.1:8000' >> "$GITHUB_ENV"
          else
            if [ -z "${INPUT_BASE_URL}" ]; then
              echo 'ERROR: external mode requires base_url' >&2
              exit 1
            fi
            echo "BASE_URL=${INPUT_BASE_URL}" >> "$GITHUB_ENV"
          fi

      - name: Save meta
        run: |
          {
            echo "target_mode=${TARGET_MODE}"
            echo "base_url=${BASE_URL}"
            echo "vus=${K6_VUS}"
            echo "duration=${K6_DURATION}"
            echo "think_ms=${THINK_MS}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "sha=${GITHUB_SHA}"
          } > ci_artifacts/runtime_artifacts/load_meta.txt

      - name: Run k6 runtime diagnostic
        run: |
          cd extracted
          k6 run \
            --vus "${K6_VUS}" \
            --duration "${K6_DURATION}" \
            --summary-export \
              ../ci_artifacts/runtime_artifacts/k6_summary.json \
            -e BASE_URL="${BASE_URL}" \
            -e THINK_MS="${THINK_MS}" \
            tests/load/k6-scenarios/runtime_diag.js \
            | tee ../ci_artifacts/runtime_artifacts/k6_output.txt

      - name: Save process info
        if: always()
        run: |
          ps aux > ci_artifacts/runtime_artifacts/ps_aux.txt

      - name: Stop local backend
        if: ${{ always() && env.TARGET_MODE == 'local' }}
        run: |
          if [ -f ci_artifacts/backend_logs/backend.pid ]; then
            kill "$(cat ci_artifacts/backend_logs/backend.pid)" || true
          fi

      - name: Collect backend log
        if: ${{ always() && env.TARGET_MODE == 'local' }}
        run: |
          if [ -f ci_artifacts/backend_logs/backend.log ]; then
            cp ci_artifacts/backend_logs/backend.log \
              ci_artifacts/runtime_artifacts/backend.log
            tail -n 200 ci_artifacts/backend_logs/backend.log \
              > ci_artifacts/runtime_artifacts/backend_tail.txt
          fi

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-diagnostic-k6-artifacts
          path: ci_artifacts/runtime_artifacts/
          if-no-files-found: warn
